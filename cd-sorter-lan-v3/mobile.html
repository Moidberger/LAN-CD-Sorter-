<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>CD Sorter — Scan</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0c0f;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.09);
      --text: #f0ece4;
      --muted: rgba(240,236,228,0.4);
      --accent: #c8f0a0;
      --danger: #ff7070;
    }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 10% 0%, rgba(80,60,120,0.2) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 100%, rgba(40,80,100,0.15) 0%, transparent 55%);
      min-height: 100dvh;
      font-family: 'Syne', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 40px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1;
    }

    .sub {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }

    /* Preview */
    #preview-wrap {
      width: 100%;
      max-width: 400px;
      aspect-ratio: 4/3;
      border-radius: 16px;
      overflow: hidden;
      border: 2px dashed var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      position: relative;
      transition: border-color 0.2s;
    }

    #preview-wrap.has-image {
      border-style: solid;
      border-color: rgba(255,255,255,0.15);
    }

    #preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    #preview-wrap.has-image #preview { display: block; }
    #preview-wrap.has-image .placeholder { display: none; }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--muted);
    }

    .placeholder-icon { font-size: 40px; }

    .placeholder-text {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      text-align: center;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 16px;
    }

    .btn {
      flex: 1;
      padding: 15px 12px;
      border-radius: 12px;
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .btn-camera {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-camera:active { background: rgba(255,255,255,0.14); }

    .btn-send {
      background: var(--accent);
      color: #0d0c0f;
      flex: 1.4;
    }

    .btn-send:active { filter: brightness(0.9); }
    .btn-send:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #file-input { display: none; }

    /* Status */
    #status {
      width: 100%;
      max-width: 400px;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    #status.success { color: var(--accent); }
    #status.error   { color: var(--danger); }

    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    /* Recent scans */
    #results {
      width: 100%;
      max-width: 400px;
      margin-top: 24px;
    }

    .results-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .cd-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 6px;
      animation: fadeIn 0.3s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .cd-disc {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c0c0c0, #888 40%, #c0c0c0 60%, #666);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.07), inset 0 0 0 7px rgba(0,0,0,0.3);
      flex-shrink: 0;
    }

    .cd-text { flex: 1; min-width: 0; }

    .cd-artist {
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .cd-album {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .badge-new {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      padding: 2px 6px;
      background: rgba(200, 240, 160, 0.15);
      color: var(--accent);
      border-radius: 4px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <header>
    <div class="eyebrow">CD Sorter</div>
    <h1>Scan CDs</h1>
    <p class="sub">point → shoot → done</p>
  </header>

  <div id="preview-wrap">
    <div class="placeholder">
      <div class="placeholder-icon">💿</div>
      <div class="placeholder-text">Tap "Camera" or "Gallery"<br>to pick a photo</div>
    </div>
    <img id="preview" alt="Preview" />
  </div>

  <div class="btn-row">
    <label class="btn btn-camera" for="file-input" id="camera-btn">
      📷 Camera
    </label>
    <label class="btn btn-camera" for="file-gallery" id="gallery-btn">
      🖼 Gallery
    </label>
  </div>

  <input type="file" id="file-input"   accept="image/*" capture="environment" />
  <input type="file" id="file-gallery" accept="image/*" />

  <div class="btn-row">
    <button class="btn btn-send" id="send-btn" disabled>
      ⬆ Send to Desktop
    </button>
  </div>

  <div id="status">Ready to scan</div>

  <div id="results"></div>

  <script>
    let selectedFile = null;

    const previewWrap = document.getElementById('preview-wrap');
    const previewImg  = document.getElementById('preview');
    const sendBtn     = document.getElementById('send-btn');
    const statusEl    = document.getElementById('status');
    const resultsEl   = document.getElementById('results');

    function setPreview(file) {
      selectedFile = file;
      const url = URL.createObjectURL(file);
      previewImg.src = url;
      previewWrap.classList.add('has-image');
      sendBtn.disabled = false;
      setStatus('Image ready — tap Send to Desktop', '');
    }

    document.getElementById('file-input').addEventListener('change', e => {
      if (e.target.files[0]) setPreview(e.target.files[0]);
    });

    document.getElementById('file-gallery').addEventListener('change', e => {
      if (e.target.files[0]) setPreview(e.target.files[0]);
    });

    function setStatus(msg, type = '') {
      statusEl.className = type;
      statusEl.innerHTML = type === 'loading'
        ? `<div class="spinner"></div><span>${msg}</span>`
        : msg;
    }

    function addCDs(cds) {
      if (!cds.length) return;

      if (!document.querySelector('.results-label')) {
        const label = document.createElement('div');
        label.className = 'results-label';
        label.textContent = 'Just added';
        resultsEl.prepend(label);
      }

      // Remove old "just added" items
      resultsEl.querySelectorAll('.cd-item').forEach(el => el.remove());

      cds.forEach(cd => {
        const item = document.createElement('div');
        item.className = 'cd-item';
        item.innerHTML = `
          <div class="cd-disc"></div>
          <div class="cd-text">
            <div class="cd-artist">${escHtml(cd.artist)}</div>
            <div class="cd-album">${escHtml(cd.album)}</div>
          </div>
          <div class="badge-new">new</div>
        `;
        resultsEl.appendChild(item);
      });
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    sendBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      setStatus('Reading image…', 'loading');
      sendBtn.disabled = true;

      const reader = new FileReader();
      reader.onload = async () => {
        const b64 = reader.result.split(',')[1];
        const mediaType = selectedFile.type || 'image/jpeg';

        setStatus('Sending to desktop…', 'loading');

        try {
          const res = await fetch('/api/upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: b64, mediaType })
          });
          const data = await res.json();

          if (!res.ok) throw new Error(data.error || 'Server error');

          if (data.found === 0) {
            setStatus('⚠ No CDs detected — try a clearer shot', 'error');
          } else {
            setStatus(`✓ ${data.found} CD${data.found > 1 ? 's' : ''} added to your collection!`, 'success');
            addCDs(data.cds);
          }
        } catch (err) {
          setStatus(`Error: ${err.message}`, 'error');
        }

        sendBtn.disabled = false;
      };

      reader.readAsDataURL(selectedFile);
    });
  </script>
</body>
</html>
